name: medaayu
description: MedAayu — medicine reminders and family care.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend
  supabase_flutter: ^2.5.0

  # Firebase — notifications + crash reporting only (NOT auth)
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  firebase_crashlytics: ^4.0.0

  # On-device prescription OCR
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.1.2

  # Local alarm-style reminders
  flutter_local_notifications: ^17.2.0
  android_alarm_manager_plus: ^4.0.0
  timezone: ^0.9.4

  # SOS
  url_launcher: ^6.3.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.0
  sensors_plus: ^6.0.1  # accelerometer stream for fall detection
  home_widget: ^0.6.0   # SOS home screen widget

  # Subscriptions
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.3.6+2

  # State + utils
  provider: ^6.1.2
  http: ^1.2.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
